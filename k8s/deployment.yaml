apiVersion: apps/v1
kind: Deployment
metadata:
  name: friends
  namespace: tds-group-3
  labels:
    app: friends
spec:
  replicas: 1
  selector:
    matchLabels:
      app: friends
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: friends
    spec:
      containers:
        - name: friends
          image: 172786533418.dkr.ecr.us-east-2.amazonaws.com/tds-group-3/friends:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: friends-config
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: friends-secret
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: friends-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: friends-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: friends-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: friends-secret
                  key: JWT_SECRET
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: friends-secret
                  key: INTERNAL_SECRET
            - name: LOKI_URL
              valueFrom:
                secretKeyRef:
                  name: friends-secret
                  key: LOKI_URL
            - name: LOKI_USER
              valueFrom:
                secretKeyRef:
                  name: friends-secret
                  key: LOKI_USER
            - name: LOKI_TOKEN
              valueFrom:
                secretKeyRef:
                  name: friends-secret
                  key: LOKI_TOKEN
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
