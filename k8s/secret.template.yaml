apiVersion: v1
kind: Secret
metadata:
  name: friends-secret
  namespace: udesamigos
type: Opaque
# Valores reales vienen de GitHub Secrets via: envsubst < secret.template.yaml > secret.yaml
# NUNCA commitear secret.yaml (está en .gitignore)
stringData:
  DB_HOST: "${DB_HOST}"
  DB_NAME: "${FRIENDS_DB_NAME}"
  DB_USER: "${FRIENDS_DB_USER}"
  DB_PASSWORD: "${FRIENDS_DB_PASSWORD}"
  JWT_SECRET: "${JWT_SECRET}"
