apiVersion: v1
kind: Secret
metadata:
  name: friends-secret
  namespace: tds-group-3
type: Opaque
stringData:
  DB_HOST: "${DB_HOST}"
  DB_NAME: "${FRIENDS_DB_NAME}"
  DB_USER: "${FRIENDS_DB_USER}"
  DB_PASSWORD: "${FRIENDS_DB_PASSWORD}"
  DB_PORT: "${FRIENDS_DB_PORT}"
  JWT_SECRET: "${JWT_SECRET}"
  INTERNAL_SECRET: "${INTERNAL_SECRET}"
  LOKI_URL: "${LOKI_URL}"
  LOKI_USER: "${LOKI_USER}"
  LOKI_TOKEN: "${LOKI_TOKEN}"
